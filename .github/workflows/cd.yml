name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ secrets.APP_PUBLIC_URL }}
    steps:
      - name: Trigger provider deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.APP_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Missing APP_DEPLOY_WEBHOOK_URL secret."
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL"

      - name: Smoke check application health
        if: ${{ secrets.APP_PUBLIC_URL != '' }}
        env:
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${APP_PUBLIC_URL%/}/_stcore/health" >/dev/null; then
              echo "Healthy deployment."
              exit 0
            fi
            echo "App not healthy yet, retrying..."
            sleep 10
          done
          echo "Health check failed."
          exit 1
